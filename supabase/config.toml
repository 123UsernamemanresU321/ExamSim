project_id = "exam-vault"

[api]
enabled = true
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]

[auth]
enabled = true
site_url = "https://examvault.tutor-mcp.com"
additional_redirect_urls = [
  "https://examvault.tutor-mcp.com",
  "https://examvault.tutor-mcp.com/**",
  "https://exam-vault-zeta.vercel.app",
  "https://exam-vault-zeta.vercel.app/**",
  "http://localhost:3000",
  "http://localhost:3000/**",
]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[storage]
enabled = true
