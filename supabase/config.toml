project_id = "exam-vault"

[api]
enabled = true
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]

[auth]
enabled = true
site_url = "https://examvault.tutor-mcp.com"
additional_redirect_urls = [
  "https://examvault.tutor-mcp.com",
  "https://examvault.tutor-mcp.com/**",
  "https://exam-vault-zeta.vercel.app",
  "https://exam-vault-zeta.vercel.app/**",
  "http://localhost:3000",
  "http://localhost:3000/**",
]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[storage]
enabled = true

[functions.activate-student]
verify_jwt = false

# Public exam-entry functions perform their own hashed exam-code, guest-token,
# attempt-session, and state-token validation. They do not accept user JWTs as
# proof of access.
[functions.resolve-exam-code]
verify_jwt = false

[functions.join-exam-session]
verify_jwt = false

[functions.guest-start-attempt-session]
verify_jwt = false

[functions.guest-get-attempt-state]
verify_jwt = false

[functions.guest-seb-verify-session]
verify_jwt = false

[functions.guest-get-attempt-package]
verify_jwt = false

[functions.guest-get-attempt-resources]
verify_jwt = false

[functions.guest-save-response]
verify_jwt = false

[functions.guest-issue-upload-slot-url]
verify_jwt = false

[functions.guest-confirm-upload-slot]
verify_jwt = false

[functions.guest-finalize-attempt]
verify_jwt = false

[functions.guest-send-invigilation-message]
verify_jwt = false

[functions.guest-acknowledge-invigilation-message]
verify_jwt = false
